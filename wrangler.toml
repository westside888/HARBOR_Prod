name = "win-web-prod"
compatibility_date = "2026-05-28"
pages_build_output_dir = "dist"

# Set BREVO_API_KEY as an encrypted secret in the Cloudflare Pages dashboard.
[vars]
BREVO_LIST_VETERAN = "26"
BREVO_LIST_EMPLOYER = "27"
BREVO_LIST_DONOR = "28"
# Brevo list ID for "_newsletter" — set in Cloudflare dashboard after creating the list
BREVO_LIST_NEWSLETTER = ""
ALLOWED_ORIGINS = "https://warriorsinneed.org,https://www.warriorsinneed.org"
